*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0a192f;
  --light-navy:#112240;
  --lightest-navy:#233554;
  --slate:#8892b0;
  --light-slate:#a8b2d8;
  --lightest-slate:#ccd6f6;
  --white:#e6f1ff;
  --green:#64ffda;
  --green-tint:rgba(100,255,218,0.1);
  --font-sans:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --tr:all 0.25s cubic-bezier(0.645,0.045,0.355,1);
}
html{scroll-behavior:smooth;}
body{background:var(--navy);color:var(--slate);font-family:var(--font-sans);font-size:16px;line-height:1.6;overflow-x:hidden;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--navy);}
::-webkit-scrollbar-thumb{background:var(--lightest-navy);border-radius:3px;}

#spotlight{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(700px circle at var(--mx,50%) var(--my,50%),rgba(100,255,218,0.045),transparent 80%);
}

.layout{
  display:grid;grid-template-columns:42% 58%;
  min-height:100vh;max-width:1280px;margin:0 auto;position:relative;z-index:1;
}
@media(max-width:900px){.layout{grid-template-columns:1fr;}}

/* LEFT */
.left{
  position:sticky;top:0;height:100vh;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:80px 32px 60px 60px;
}
@media(max-width:900px){.left{position:relative;height:auto;padding:80px 30px 20px;}}

.lang-toggle{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--font-mono);font-size:11px;color:var(--slate);
  margin-bottom:36px;cursor:pointer;border:none;background:none;transition:var(--tr);
}
.lang-toggle:hover{color:var(--green);}
.lang-toggle span.active{color:var(--green);}
.lang-sep{color:var(--lightest-navy);}

.intro-label{font-family:var(--font-mono);font-size:13px;color:var(--green);margin-bottom:14px;letter-spacing:0.04em;}
.main-name{font-size:clamp(32px,4.5vw,52px);font-weight:700;color:var(--lightest-slate);line-height:1.1;margin-bottom:10px;}
.main-role{font-size:clamp(15px,2vw,20px);font-weight:500;color:var(--light-slate);line-height:1.4;margin-bottom:20px;}
.main-desc{font-size:14px;color:var(--slate);max-width:300px;line-height:1.8;}

.nav{margin-top:44px;display:flex;flex-direction:column;gap:4px;}
.nav-item{
  display:flex;align-items:center;gap:12px;
  font-family:var(--font-mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--slate);cursor:pointer;border:none;background:none;text-align:left;
  padding:5px 0;transition:var(--tr);width:fit-content;
}
.nav-line{height:1px;width:24px;background:var(--slate);transition:var(--tr);}
.nav-item:hover,.nav-item.active{color:var(--lightest-slate);}
.nav-item:hover .nav-line,.nav-item.active .nav-line{width:52px;background:var(--green);}
.nav-item.active{color:var(--green);}

.socials{display:flex;align-items:center;gap:18px;margin-top:44px;}
.social-link{color:var(--slate);transition:var(--tr);display:flex;align-items:center;}
.social-link:hover{color:var(--green);transform:translateY(-3px);}
.social-link svg{width:19px;height:19px;fill:currentColor;}

.email-link{
  display:block;margin-top:16px;font-family:var(--font-mono);font-size:11px;
  color:var(--slate);text-decoration:none;letter-spacing:0.04em;
  transition:var(--tr);
}
.email-link:hover{color:var(--green);}

/* RIGHT */
.right{padding:80px 60px 80px 32px;}
@media(max-width:900px){.right{padding:20px 30px 80px;}}

/* SECTION */
.section{margin-bottom:96px;opacity:0;transform:translateY(24px);transition:opacity 0.55s ease,transform 0.55s ease;}
.section.visible{opacity:1;transform:none;}

.section-heading{
  display:flex;align-items:center;gap:14px;
  font-size:19px;font-weight:600;color:var(--lightest-slate);
  margin-bottom:36px;white-space:nowrap;
}
.section-heading .num{font-family:var(--font-mono);font-size:13px;color:var(--green);}
.section-heading::after{content:'';height:1px;flex:1;background:var(--lightest-navy);}

/* ABOUT */
.about-text{color:var(--slate);line-height:1.8;font-size:15px;max-width:540px;}
.about-text p{margin-bottom:14px;}

.skills-label{font-size:14px;color:var(--light-slate);margin:24px 0 12px;font-weight:500;}
.skills-categories{display:flex;flex-direction:column;gap:16px;max-width:540px;}
.skill-cat-title{

  letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;
}
.skill-tags{display:flex;flex-wrap:wrap;gap:6px;}
.skill-tag{
  font-family:var(--font-mono);font-size:11px;color:var(--light-slate);
  border:1px solid var(--lightest-navy);padding:3px 10px;border-radius:3px;
  transition:var(--tr);
}
.skill-tag:hover{border-color:var(--green);color:var(--green);}

/* EXPERIENCE */
.exp-wrapper{display:flex;gap:0;}
.exp-tabs{
  display:flex;flex-direction:column;
  border-left:2px solid var(--lightest-navy);flex-shrink:0;
}
@media(max-width:640px){
  .exp-wrapper{flex-direction:column;}
  .exp-tabs{flex-direction:row;border-left:none;border-bottom:2px solid var(--lightest-navy);overflow-x:auto;}
}
.exp-tab{
  font-family:var(--font-mono);font-size:12px;
  color:var(--slate);background:none;border:none;
  padding:11px 18px;cursor:pointer;text-align:left;
  white-space:nowrap;border-left:2px solid transparent;
  margin-left:-2px;transition:var(--tr);
}
@media(max-width:640px){
  .exp-tab{border-left:none;border-bottom:2px solid transparent;margin-left:0;margin-bottom:-2px;}
}
.exp-tab:hover{color:var(--green);background:var(--green-tint);}
.exp-tab.active{color:var(--green);border-left-color:var(--green);background:var(--green-tint);}
@media(max-width:640px){.exp-tab.active{border-left-color:transparent;border-bottom-color:var(--green);}}

.exp-content{padding:4px 0 0 28px;flex:1;}
@media(max-width:640px){.exp-content{padding:24px 0 0;}}
.exp-content h3{font-size:17px;font-weight:500;color:var(--lightest-slate);margin-bottom:4px;}
.exp-content h3 span{color:var(--green);}
.exp-date{font-family:var(--font-mono);font-size:11px;color:var(--slate);margin-bottom:18px;letter-spacing:0.04em;}
.exp-bullets{list-style:none;display:flex;flex-direction:column;gap:10px;}

.exp-bullets li::before{content:'▸';color:var(--green);font-size:11px;margin-top:4px;flex-shrink:0;}

.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.project-card{

.project-folder{color:var(--green);}
.project-folder svg{width:32px;height:32px;}
.project-links{display:flex;gap:10px;}
.project-links a{color:var(--slate);transition:var(--tr);display:flex;}
.project-links a:hover{color:var(--green);}
.project-links svg{width:17px;height:17px;fill:currentColor;}
.project-name{font-size:15px;font-weight:600;color:var(--lightest-slate);margin-bottom:8px;}
.project-desc{font-size:13px;color:var(--slate);line-height:1.7;flex:1;}
.project-tech{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px;}
.tech-tag{font-family:var(--font-mono);font-size:10px;color:var(--green);background:var(--green-tint);padding:3px 8px;border-radius:3px;}

function useIntersect(ref) {
  const [v, setV] = useState(false);
  useEffect(() => {
    const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) setV(true); }, { threshold: 0.08 });
    if (ref.current) o.observe(ref.current);
    return () => o.disconnect();
  }, []);
  return v;
}

function Section({ id, children }) {
  const ref = useRef();
  const visible = useIntersect(ref);
  return <section id={id} ref={ref} className={`section ${visible ? 'visible' : ''}`}>{children}</section>;
}
